<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tonight</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, sans-serif;
            background: #0f0f0f;
            color: #f0f0f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 560px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -1px;
        }

        .subtitle {
            color: #888;
            margin-bottom: 32px;
            font-size: 1rem;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input, select {
            width: 100%;
            padding: 12px 16px;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            color: #f0f0f0;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus, select:focus {
            border-color: #555;
        }

        select option {
            background: #1a1a1a;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #f0f0f0;
            color: #0f0f0f;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            transition: opacity 0.2s;
        }

        button:hover { opacity: 0.85; }
        button:disabled { opacity: 0.4; cursor: not-allowed; }

        .result {
            margin-top: 32px;
            padding: 24px;
            background: #1a1a1a;
            border-radius: 8px;
            border: 1px solid #2a2a2a;
            white-space: pre-wrap;
            line-height: 1.7;
            font-size: 0.95rem;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Tonight</h1>
        <p class="subtitle">Tell me how you're feeling. I'll handle the rest.</p>

        <form id="form">
            <div class="form-group">
                <label>How are you feeling?</label>
                <input type="text" name="mood" placeholder="restless, tired, social, anxious..." required>
            </div>
            <div class="form-group">
                <label>What city are you in?</label>
                <input type="text" name="location" placeholder="Miami, FL" required>
            </div>
            <div class="form-group">
                <label>Energy level</label>
                <select name="energy">
                    <option value="low">Low ‚Äî barely off the couch</option>
                    <option value="medium" selected>Medium ‚Äî up for something easy</option>
                    <option value="high">High ‚Äî let's actually do something</option>
                </select>
            </div>
            <button type="submit" id="btn">Figure out my night ‚Üí</button>
        </form>

        <div class="result" id="result"></div>
    </div>

    <script>
        document.getElementById("form").addEventListener("submit", async (e) => {
            e.preventDefault();

            const btn = document.getElementById("btn");
            const result = document.getElementById("result");
            const formData = new FormData(e.target);

            btn.disabled = true;
            btn.textContent = "Thinking...";
            result.style.display = "block";
            result.textContent = "";

            try {
                const response = await fetch("/recommend", {
                    method: "POST",
                    body: formData
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    result.textContent += decoder.decode(value);
                }
            } catch (err) {
                result.textContent = "Something went wrong. Try again.";
            }

            btn.disabled = false;
            btn.textContent = "Figure out my night ‚Üí";
        });
    </script>
</body>
</html>
